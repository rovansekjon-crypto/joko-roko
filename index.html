<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Compress - Pro Version</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.9);
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; border: none; background: #334155; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab.active { background: var(--primary); }
        .panel { display: none; }
        .panel.active { display: block; }
        .drop-zone {
            border: 2px dashed #475569;
            padding: 40px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .progress-container { margin: 20px 0; display: none; }
        .progress-bar { height: 10px; background: #334155; border-radius: 5px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.2s; }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }
        .download-link {
            display: block;
            margin-top: 15px;
            color: #60a5fa;
            text-decoration: none;
            font-weight: bold;
            padding: 10px;
            border: 1px solid #60a5fa;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Elite Compress</h1>
    <div class="tabs">
        <button class="tab active" onclick="openTab('img')">IMG</button>
        <button class="tab" onclick="openTab('vid')">VIDEO</button>
        <button class="tab" onclick="openTab('pdf')">PDF</button>
        <button class="tab" onclick="openTab('zip')">ZIP</button>
    </div>

    <div id="img" class="panel active">
        <div class="drop-zone" onclick="document.getElementById('inImg').click()">Click to upload Images</div>
        <input type="file" id="inImg" multiple accept="image/*" style="display:none">
        <div id="outImg"></div>
    </div>

    <div id="vid" class="panel">
        <div class="drop-zone" onclick="document.getElementById('inVid').click()">Click to upload Video</div>
        <input type="file" id="inVid" accept="video/*" style="display:none">
        <div class="progress-container" id="progVid">
            <div class="progress-bar"><div class="progress-fill" id="fillVid"></div></div>
            <p id="statusText">Processing: 0%</p>
        </div>
        <div id="vidDownloadArea"></div>
    </div>

    <div id="pdf" class="panel">
        <input type="file" id="inPdf" accept=".pdf">
        <button class="btn" id="runPdf" style="margin-top:10px">Compress PDF</button>
    </div>

    <div id="zip" class="panel">
        <input type="file" id="inZip" multiple>
        <button class="btn" id="runZip" style="margin-top:10px">Create ZIP</button>
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: false });

    function openTab(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- VIDEO COMPRESSION ---
    document.getElementById('inVid').onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;

        const fill = document.getElementById('fillVid');
        const text = document.getElementById('statusText');
        const downloadArea = document.getElementById('vidDownloadArea');
        document.getElementById('progVid').style.display = 'block';
        downloadArea.innerHTML = '';

        if (!ffmpeg.isLoaded()) {
            text.innerText = "Loading Engine...";
            await ffmpeg.load();
        }

        ffmpeg.setProgress(({ ratio }) => {
            const pct = Math.round(ratio * 100);
            fill.style.width = pct + '%';
            text.innerText = `Compressing: ${pct}%`;
        });

        ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));
        
        // Zamenjali smo 'ultrafast' z 'medium' za boljšo kompresijo
        // CRF 30 bo močno zmanjšal datoteko
        await ffmpeg.run(
            '-i', 'input.mp4',
            '-vcodec', 'libx264',
            '-crf', '30',
            '-preset', 'medium',
            '-movflags', '+faststart',
            'output.mp4'
        );

        const data = ffmpeg.FS('readFile', 'output.mp4');
        const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        
        text.innerText = "Done!";
        downloadArea.innerHTML = `<a href="${url}" download="compressed.mp4" class="download-link">⬇️ Download Compressed Video</a>`;
    };

    // --- IMAGE COMPRESSION ---
    document.getElementById('inImg').onchange = (e) => {
        const out = document.getElementById('outImg');
        out.innerHTML = '';
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    canvas.toBlob((blob) => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `opti_${file.name}`;
                        a.innerText = `Download ${file.name}`;
                        a.className = "download-link";
                        out.appendChild(a);
                    }, 'image/jpeg', 0.6);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });
    };

    // --- PDF ---
    document.getElementById('runPdf').onclick = async () => {
        const file = document.getElementById('inPdf').files[0];
        if(!file) return alert("Select PDF");
        const arrayBuffer = await file.arrayBuffer();
        const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
        const newPdf = await PDFLib.PDFDocument.create();
        const pages = await newPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
        pages.forEach(p => newPdf.addPage(p));
        const pdfBytes = await newPdf.save();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([pdfBytes], { type: 'application/pdf' }));
        a.download = "compressed.pdf";
        a.click();
    };

    // --- ZIP ---
    document.getElementById('runZip').onclick = async () => {
        const files = document.getElementById('inZip').files;
        const zip = new JSZip();
        Array.from(files).forEach(f => zip.file(f.name, f));
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = "archive.zip";
        a.click();
    };
</script>

</body>
</html>
